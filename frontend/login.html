<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Kidney Risk System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image:url("b2.jpg") ;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            width: 360px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            margin-top: 12px;
            display: block;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #038e52;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2>Login</h2>

    <label>Email</label>
    <input type="email" id="email">

    <label>Password</label>
    <input type="password" id="password">

    <button onclick="login()">Login</button>

    <div class="error" id="error"></div>
</div>

<script>
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // 🔐 Demo credentials
    if (email === "amna.mirza782@gmail.com" && password === "123456") {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "splash.html";
    } else {
        document.getElementById("error").innerText =
            "Invalid email or password";
    }
}
</script>

</body>
</html>
